{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-end justify-content-between gap-3 flex-wrap">
  <div>
    <h1 class="h3 fw-bold mb-2">
      <i class="bi bi-book text-accent me-2" aria-hidden="true"></i>Теория и подсказки
    </h1>
    <p class="text-secondary mb-0">Коротко о главном: как думать и где чаще всего ошибаются.</p>
  </div>
  <a class="btn btn-primary" href="{{ url_for('quiz') }}">
    <i class="bi bi-check2-circle me-2" aria-hidden="true"></i>Пройти тест
  </a>
</div>

<div class="accordion mt-4" id="accTheory">
  {% for topic in topics %}
    <div class="accordion-item">
      <h2 class="accordion-header" id="headingT{{ loop.index }}">
        <button
          class="accordion-button collapsed"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseT{{ loop.index }}"
          aria-expanded="false"
          aria-controls="collapseT{{ loop.index }}"
        >
          <i class="bi {{ topic_icons.get(topic.title, 'bi-journal-text') }} me-2 text-accent" aria-hidden="true"></i>{{ topic.title }}
        </button>
      </h2>
      <div
        id="collapseT{{ loop.index }}"
        class="accordion-collapse collapse"
        aria-labelledby="headingT{{ loop.index }}"
        data-bs-parent="#accTheory"
      >
        <div class="accordion-body">
          <div class="d-grid gap-3">
            {% for item in topic.items %}
              <div class="info-panel p-3 rounded-4 border bg-white">
                <div class="d-flex align-items-start gap-2 mb-1">
                  <i class="bi bi-lightbulb text-accent fs-5 mt-1" aria-hidden="true"></i>
                  <div class="fw-bold">{{ item.title }}</div>
                </div>
                <div class="text-secondary">{{ item.body }}</div>
              </div>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
