{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-end justify-content-between gap-3 flex-wrap">
  <div>
    <h1 class="h3 fw-bold mb-2">
      <i class="bi bi-calculator text-accent me-2" aria-hidden="true"></i>Формулы по разделам
    </h1>
    <p class="text-secondary mb-0">Используй как шпаргалку при решении задач.</p>
  </div>
  <a class="btn btn-primary" href="{{ url_for('quiz') }}">
    <i class="bi bi-check2-square me-2" aria-hidden="true"></i>Тест на закрепление
  </a>
</div>

<div class="accordion mt-4" id="accFormulas">
  {% for topic in topics %}
    <div class="accordion-item">
      <h2 class="accordion-header" id="heading{{ loop.index }}">
        <button
          class="accordion-button collapsed"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapse{{ loop.index }}"
          aria-expanded="false"
          aria-controls="collapse{{ loop.index }}"
        >
          <i class="bi {{ topic_icons.get(topic.title, 'bi-layers') }} me-2 text-accent" aria-hidden="true"></i>{{ topic.title }}
        </button>
      </h2>
      <div
        id="collapse{{ loop.index }}"
        class="accordion-collapse collapse"
        aria-labelledby="heading{{ loop.index }}"
        data-bs-parent="#accFormulas"
      >
        <div class="accordion-body">
          <div class="row g-3">
            {% for f in topic.items %}
              <div class="col-12">
                <div class="formula-block p-3 rounded-4 border bg-light">
                  <div class="d-flex align-items-start gap-2">
                    <i class="bi bi-equal text-accent fs-5 mt-1" aria-hidden="true"></i>
                    <div class="formula-text fw-bold">
                      <code class="formula-code">{{ f.formula }}</code>
                    </div>
                  </div>
                  <div class="text-secondary mt-2 d-flex gap-2 align-items-start">
                    <i class="bi bi-lightbulb mt-1" aria-hidden="true"></i>
                    <div>{{ f.note }}</div>
                  </div>
                </div>
              </div>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
