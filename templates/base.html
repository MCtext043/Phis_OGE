<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "ОГЭ. Физика" }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-accent">
      <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">ОГЭ. Физика</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
          aria-controls="nav"
          aria-expanded="false"
          aria-label="Открыть меню"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('formulas') }}">
                <i class="bi bi-calculator me-2" aria-hidden="true"></i>Формулы
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('theory') }}">
                <i class="bi bi-book me-2" aria-hidden="true"></i>Теория
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('scientists') }}">
                <i class="bi bi-person-badge me-2" aria-hidden="true"></i>Учёные
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('quiz') }}">
                <i class="bi bi-check2-square me-2" aria-hidden="true"></i>Тест
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container-lg py-4 px-3 px-lg-0">
      {% block content %}{% endblock %}
    </main>

    <footer class="text-muted py-3">
      <div class="container small">
        Подготовка к ОГЭ по физике. Справочник и тест на закрепление знаний.
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
